<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Dark background matching the site theme -->
  <rect width="32" height="32" rx="7" fill="#070B14"/>

  <!--
    All Might's two iconic blonde hair spikes.
    Triple meaning:
      1. All Might's signature silhouette (Pillar of Hope)
      2. Bull horns — bullish market
      3. Upward trend lines — financial growth / Plus Ultra
  -->

  <!-- Left spike -->
  <path d="M 2 28 L 11 2 L 16 18 Z" fill="#FFD700"/>

  <!-- Right spike -->
  <path d="M 30 28 L 21 2 L 16 18 Z" fill="#FFD700"/>

  <!--
    All Might's face — a powerful circle in the site's primary blue.
    Also reads as a gold coin or financial badge.
    The spikes emerge from behind it, like his hair over his face.
  -->
  <circle cx="16" cy="25" r="7.5" fill="#4F8EF7"/>

  <!-- Inner ring — gives the coin/badge depth -->
  <circle cx="16" cy="25" r="6" fill="none" stroke="#93C5FD" stroke-width="0.75" opacity="0.5"/>

  <!--
    The dollar sign — financial identity.
    White for max contrast on the blue circle.
    Font-weight 900 keeps it bold and readable at 16px favicon size.
  -->
  <text
    x="16"
    y="29.5"
    font-family="Arial Black, Arial, sans-serif"
    font-size="11"
    font-weight="900"
    text-anchor="middle"
    fill="#FFFFFF"
  >$</text>

  <!--
    Subtle "Plus Ultra" energy lines radiating from the spike tips.
    Small, low-opacity streaks that suggest All Might's explosive power.
  -->
  <line x1="11" y1="2"  x2="9"  y2="0"  stroke="#FFD700" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="11" y1="2"  x2="8"  y2="3"  stroke="#FFD700" stroke-width="0.75" stroke-linecap="round" opacity="0.4"/>
  <line x1="21" y1="2"  x2="23" y2="0"  stroke="#FFD700" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="2"  x2="24" y2="3"  stroke="#FFD700" stroke-width="0.75" stroke-linecap="round" opacity="0.4"/>

</svg>
